<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zenith OX — Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">

  <div class="glass-card auth-card">
    <h1>ZENITH <span class="accent">OX</span></h1>
    <p class="tagline">Create your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Pure HTML form — all validation is done in Python. -->
    <form class="auth-form" method="POST" action="/register">
      <label for="name">Display name (optional)</label>
      <input type="text" id="name" name="name"
             placeholder="e.g. Alice" autocomplete="name" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
             placeholder="you@example.com" autocomplete="email" />

      <label for="password">Password (min 6 chars)</label>
      <input type="password" id="password" name="password" required
             minlength="6" placeholder="Choose a password"
             autocomplete="new-password" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" required
             minlength="6" placeholder="Repeat your password"
             autocomplete="new-password" />

      <button type="submit">Create account</button>
    </form>

    {% if google_enabled() %}
      <div class="divider"><span>or</span></div>
      <a class="google-btn" href="/login/google">
        <span class="g-icon">G</span> Sign up with Google
      </a>
    {% endif %}

    <p class="foot">
      Already have an account? <a href="/login">Login here</a>
    </p>
  </div>

</body>
</html>
