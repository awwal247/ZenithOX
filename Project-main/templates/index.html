<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zenith OX — {{ mode.name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="app-shell">

    <div class="greeting-bar">
      {{ greeting }} 👋 · <strong>{{ mode.emoji }} {{ mode.name }}</strong>
    </div>

    <header class="app-header">
      <div class="brand">
        <span class="logo-dot"></span>
        <h1>ZENITH <span class="accent">OX</span></h1>
      </div>
      <div class="user-pill">
        <span>👤 {{ username }}</span>
        <a href="/menu" class="btn-header" title="Switch AI Mode">🔀 Switch</a>
        <button id="clearBtn" title="Clear memory">🧹 Clear</button>
        <button id="logoutBtn" title="Logout">⎋ Logout</button>
      </div>
    </header>

    <main class="chat-main">
      <div id="chat-box" class="chat-box">
        <!-- Chat messages appear here -->
      </div>

      <form id="chatForm" class="chat-input">
        <input type="text" id="user-input" placeholder="Type your question..."
               autocomplete="off" required />
        <button type="submit" id="sendBtn">Send ➤</button>
      </form>
    </main>

    <footer class="app-footer">
      Zenith OX · {{ mode.name }} · Secure auth · Vector memory
    </footer>
  </div>

  <script>
    window.ZENITH_MODE = "{{ mode_key }}";
  </script>
  <script src="/static/script.js"></script>
</body>
</html>
