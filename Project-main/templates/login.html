<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zenith OX — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">

  <div class="glass-card auth-card">
    <h1>ZENITH <span class="accent">OX</span></h1>
    <p class="tagline">Sign in to your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Pure HTML form — no JavaScript needed. -->
    <form class="auth-form" method="POST" action="/login">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
             placeholder="you@example.com" autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required
             placeholder="Your password" autocomplete="current-password" />

      <button type="submit">Sign in</button>
    </form>

    {% if google_enabled() %}
      <div class="divider"><span>or</span></div>
      <a class="google-btn" href="/login/google">
        <span class="g-icon">G</span> Continue with Google
      </a>
    {% endif %}

    <p class="foot">
      Don't have an account? <a href="/register">Register here</a>
    </p>
  </div>

</body>
</html>
